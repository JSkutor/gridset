<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>

    <!--
      3-stop Tokyo Night neon gradient:
      Start: #7aa2f7 (Tokyo Night Blue, matches --accent)
      Middle: #bb9af7 (Tokyo Night Violet/Purple, secondary accent)
      End: #9ece6a (Tokyo Night Green, success timer color)
      This keeps every zone perfectly saturated and matches Gridset's dark theme aesthetics.
    -->
    <linearGradient id="dg" x1="24" y1="0" x2="488" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7aa2f7"/>
      <stop offset="44%"  stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#9ece6a"/>
    </linearGradient>

    <!-- Same gradient, high-visibility semi-transparent, for grid lines -->
    <linearGradient id="lg" x1="0" y1="0" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7aa2f7" stop-opacity="0.80"/>
      <stop offset="44%"  stop-color="#bb9af7" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#9ece6a" stop-opacity="0.80"/>
    </linearGradient>

    <!-- Neon bloom: blur the source then composite original on top -->
    <filter id="glow" x="-28%" y="-28%" width="156%" height="156%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>


  <!-- ═══════════════════════════════════════════════════
       # GRID LINES  (Thickened to 16px for high-visibility at small favicon sizes)

       H1 y=152  — top  of outer plates
       H2 y=360  — bottom of outer plates  (152 + 208)
       V1 x=120  — right edge of left outer plate (24 + 96)
       V2 x=392  — left  edge of right outer plate
       ═══════════════════════════════════════════════════ -->

  <rect x="0"   y="144" width="512" height="16"  fill="url(#lg)"/>
  <rect x="0"   y="352" width="512" height="16"  fill="url(#lg)"/>
  <rect x="112" y="0"   width="16"  height="512" fill="url(#lg)"/>
  <rect x="384" y="0"   width="16"  height="512" fill="url(#lg)"/>


  <!-- ═══════════════════════════════════════════════════
       DUMBBELL

       Geometry (symmetric around x=256, y=256):

         Outer plate  : x 24-120  /  392-488   w=96  h=208  rx=36
         Inner collar : x 128-184 /  328-384   w=56  h=60   rx=10  (split top/bottom)
         Bar          : x 192-320              w=128 h=20   rx=10

       Plate-to-bar height ratio ≈ 10:1  → unmistakably dumbbell-shaped.
       Each plate is a tall pill (rx=36) that reads as a weight disc.
       The bar slots into the 20 px gap between the collar halves.
       ═══════════════════════════════════════════════════ -->

  <g filter="url(#glow)">

    <!-- LEFT outer plate — dominant pill shape, Tokyo Night Blue zone -->
    <rect x="24"  y="152" width="96"  height="208" rx="36" fill="url(#dg)"/>

    <!-- LEFT inner collar — top half (blue → purple) -->
    <rect x="128" y="186" width="56"  height="60"  rx="10" fill="url(#dg)"/>
    <!-- LEFT inner collar — bottom half -->
    <rect x="128" y="266" width="56"  height="60"  rx="10" fill="url(#dg)"/>

    <!-- CENTER BAR — purple zone, very thin for contrast -->
    <rect x="192" y="246" width="128" height="20"  rx="10" fill="url(#dg)"/>

    <!-- RIGHT inner collar — top half (purple → green) -->
    <rect x="328" y="186" width="56"  height="60"  rx="10" fill="url(#dg)"/>
    <!-- RIGHT inner collar — bottom half -->
    <rect x="328" y="266" width="56"  height="60"  rx="10" fill="url(#dg)"/>

    <!-- RIGHT outer plate — dominant pill shape, Tokyo Night Green zone -->
    <rect x="392" y="152" width="96"  height="208" rx="36" fill="url(#dg)"/>

  </g>

</svg>